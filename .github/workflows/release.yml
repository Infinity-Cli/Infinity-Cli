name: Auto-release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        run: |
          latest=$(git describe --tags --abbrev=0 --match "v*.*.*" 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest"
          version="${latest#v}"
          IFS=. read -r major minor patch <<< "$version"
          new_patch=$((patch + 1))
          new_version="${major}.${minor}.${new_patch}"
          new_tag="v${new_version}"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Bump version in package and installer files
        run: |
          new_version="${{ steps.version.outputs.new_version }}"
          new_tag="${{ steps.version.outputs.new_tag }}"

          sed -i "s/\"version\": \"[0-9]*\.[0-9]*\.[0-9]*\"/\"version\": \"$new_version\"/" cli-ts/package.json
          sed -i "s/^version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"$new_version\"/" pyproject.toml
          sed -i "s/\\\$Script:ReleaseVersion = \"v[0-9]*\\\.[0-9]*\\\.[0-9]*\"/\\\$Script:ReleaseVersion = \"$new_tag\"/" install.ps1
          sed -i "s/^RELEASE_VERSION=\"v[0-9]*\\\.[0-9]*\\\.[0-9]*\"/RELEASE_VERSION=\"$new_tag\"/" install.sh

      - name: Commit version bump
        run: |
          new_tag="${{ steps.version.outputs.new_tag }}"
          git add cli-ts/package.json pyproject.toml install.ps1 install.sh
          git commit -m "release: bump version to $new_tag [skip ci]" || echo "No changes to commit"

      - name: Push version bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Create tag
        run: |
          new_tag="${{ steps.version.outputs.new_tag }}"
          git tag -a "$new_tag" -m "release: $new_tag"
          git push origin "$new_tag"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_tag="${{ steps.version.outputs.new_tag }}"
          gh release create "$new_tag" \
            --title "$new_tag" \
            --generate-notes
