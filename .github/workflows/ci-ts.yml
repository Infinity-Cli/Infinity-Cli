name: CI TypeScript

on:
  push:
  pull_request:

jobs:
  ci-ts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        working-directory: ./cli-ts

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./cli-ts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Installer dry-run: verify install scripts parse and print without changes
  # ---------------------------------------------------------------------------
  installer-dry-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            script: ./install.sh --dry-run
          - os: macos-latest
            shell: bash
            script: ./install.sh --dry-run
          - os: windows-latest
            shell: pwsh
            script: powershell -NoProfile -File ./install.ps1 -DryRun

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Run installer dry-run ( ${{ matrix.os }} )
        run: ${{ matrix.script }}

  # ---------------------------------------------------------------------------
  # Daemon lifecycle: start, status, stop — verify the daemon commands work
  # ---------------------------------------------------------------------------
  daemon-lifecycle:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cli-ts

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./cli-ts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Start daemon
        run: node dist/index.js daemon start

      - name: Wait for daemon to be ready
        run: sleep 3

      - name: Check daemon status
        run: |
          STATUS_OUTPUT=$(node dist/index.js daemon status)
          echo "$STATUS_OUTPUT"
          # Assert that the output contains "running"
          echo "$STATUS_OUTPUT" | grep -qi "running"

      - name: Stop daemon
        run: node dist/index.js daemon stop

      - name: Verify daemon is stopped
        run: |
          STATUS_OUTPUT=$(node dist/index.js daemon status)
          echo "$STATUS_OUTPUT"
          # Assert that the output contains "not running"
          echo "$STATUS_OUTPUT" | grep -qi "not running"
