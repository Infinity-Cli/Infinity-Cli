name: CI TypeScript

on:
  push:
  pull_request:

jobs:
  ci-ts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    defaults:
      run:
        working-directory: ./cli-ts

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ./cli-ts/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

  # ---------------------------------------------------------------------------
  # Installer dry-run: verify install scripts parse and print without changes
  # ---------------------------------------------------------------------------
  installer-dry-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            script: ./install.sh --dry-run
          - os: macos-latest
            shell: bash
            script: ./install.sh --dry-run
          - os: windows-latest
            shell: pwsh
            script: powershell -NoProfile -File ./install.ps1 -DryRun

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Run installer dry-run ( ${{ matrix.os }} )
        run: ${{ matrix.script }}
